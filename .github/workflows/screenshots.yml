name: Screenshots

on:
  pull_request_target:
    paths:
      - "app/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "react-router.config.ts"
      - "screenshots/**"
      - ".github/workflows/screenshots.yml"
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch, tag, or SHA to screenshot. Defaults to the workflow ref."
        required: false
        type: string

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  screenshots:
    name: Build and capture screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.ref || inputs.target_ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start app
        run: |
          npm run dev -- --host 127.0.0.1 > /tmp/zava-store-vite.log 2>&1 &
          echo $! > /tmp/zava-store-vite.pid

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS -o /dev/null http://127.0.0.1:5173; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/zava-store-vite.log
          exit 1

      - name: Capture screenshots
        env:
          SCREENSHOT_BASE_URL: http://127.0.0.1:5173
          SCREENSHOT_OUTPUT_DIR: artifacts/screenshots
        run: |
          node <<'EOF'
          const { mkdir } = require("node:fs/promises");
          const { chromium } = require("playwright");

          const baseUrl = process.env.SCREENSHOT_BASE_URL;
          const outputDir = process.env.SCREENSHOT_OUTPUT_DIR;
          const launchArgs = [
            "--disable-background-networking",
            "--disable-sync",
            "--disable-default-apps",
            "--disable-extensions",
            "--disable-component-update",
            "--no-first-run",
            "--no-default-browser-check",
            "--disable-features=MediaRouter,OptimizationHints,HttpsUpgrades",
            "--host-resolver-rules=MAP * 0.0.0.0, EXCLUDE 127.0.0.1, EXCLUDE localhost",
          ];
          const viewports = [
            { name: "homepage-desktop", width: 1440, height: 1200 },
            { name: "homepage-mobile", width: 390, height: 1200 },
          ];

          (async () => {
            await mkdir(outputDir, { recursive: true });
            const browser = await chromium.launch({ args: launchArgs });
            try {
              for (const viewport of viewports) {
                const context = await browser.newContext({
                  viewport: { width: viewport.width, height: viewport.height },
                  deviceScaleFactor: 1,
                });
                const page = await context.newPage();
                await page.route("**/*", (route) => {
                  const url = new URL(route.request().url());
                  if (["127.0.0.1", "localhost"].includes(url.hostname)) {
                    return route.continue();
                  }
                  return route.abort();
                });
                await page.goto(baseUrl, { waitUntil: "networkidle" });
                await page.screenshot({
                  path: `${outputDir}/${viewport.name}.png`,
                  fullPage: true,
                });
                await context.close();
              }
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: zava-store-screenshots
          path: artifacts/screenshots/*.png
          if-no-files-found: error

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zava-store-dev-server-log
          path: /tmp/zava-store-vite.log
          if-no-files-found: ignore

      - name: Commit screenshots to PR
        id: publish_screenshots
        if: github.event_name == 'pull_request_target'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          head_subject="$(git log -1 --pretty=%s)"
          if [ "$head_subject" = "Update PR screenshots" ]; then
            echo "Screenshot files are already published on the PR head."
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          target_dir="screenshots/pr-${PR_NUMBER}"
          rm -rf "$target_dir"
          mkdir -p "$target_dir"
          cp artifacts/screenshots/*.png "$target_dir"/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$target_dir"

          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "Update PR screenshots"
            git push origin "HEAD:${PR_BRANCH}"
          fi

          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- zava-store-screenshots -->";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const screenshotSha = "${{ steps.publish_screenshots.outputs.sha }}";
            const screenshotBaseUrl = `${context.serverUrl}/${owner}/${repo}/raw/${screenshotSha}/screenshots/pr-${issue_number}`;
            const desktopUrl = `${screenshotBaseUrl}/homepage-desktop.png`;
            const mobileUrl = `${screenshotBaseUrl}/homepage-mobile.png`;
            const body = [
              marker,
              "## Screenshots captured",
              "",
              "Visual CI completed successfully for this PR.",
              "",
              "### Desktop",
              `![Desktop homepage screenshot](${desktopUrl})`,
              "",
              "### Mobile",
              `<img src="${mobileUrl}" alt="Mobile homepage screenshot" width="390">`,
              "",
              "- Artifact: `zava-store-screenshots` (`homepage-desktop.png`, `homepage-mobile.png`)",
              "- Server log artifact: `zava-store-dev-server-log`",
              `- Workflow run: ${runUrl}`,
              `- Committed files: \`screenshots/pr-${issue_number}/\``,
            ].join("\n");
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.data.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
